<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Launcher - Lightning Edition</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            overflow: hidden;
        }

        /* 1. THE VOID CONTROLLER */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #0b0c10;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: fadeOutOverlay 0.4s ease-in-out forwards;
            animation-delay: 2.8s;
        }

        /* 2. THE LASER CORE Z */
        .neon-z {
            width: 200px;
            height: 200px;
            stroke-dasharray: 600;
            stroke-dashoffset: 600;
            animation: drawZ 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            filter: drop-shadow(0 0 8px #00d2ff);
        }

        /* 3. HIGH-VOLTAGE LIGHTNING FRACTIONAL PATHS */
        .lightning-bolt {
            stroke: #ffffff;
            stroke-width: 3;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
            opacity: 0;
            filter: drop-shadow(0 0 4px #00d2ff) drop-shadow(0 0 12px #7209b7);
            /* Triggers immediate chaotic discharge loops */
            animation: lightningZap 0.4s linear infinite;
        }

        /* Staggering the bolts so they spark at different fractions of a second */
        .bolt-1 { animation-delay: 1.1s; }
        .bolt-2 { animation-delay: 1.3s; }
        .bolt-3 { animation-delay: 1.5s; }

        /* 4. PHYSICS KEYFRAME MATRICES */
        @keyframes drawZ {
            to { stroke-dashoffset: 0; }
        }

        @keyframes lightningZap {
            0%, 100% { opacity: 0; transform: scale(0.95); }
            5% { opacity: 1; transform: scale(1.02) skewX(2deg); }
            10% { opacity: 0; }
            15% { opacity: 0.8; transform: scale(0.98) skewY(-1deg); }
            20% { opacity: 0; }
            50% { opacity: 0.9; transform: scale(1.05) rotate(1deg); }
            55% { opacity: 0; }
        }

        @keyframes fadeOutOverlay {
            to { opacity: 0; visibility: hidden; }
        }

        .main-content {
            padding: 40px;
            color: #ffffff;
            text-align: center;
            margin-top: 25vh;
        }
    </style>
</head>
<body>

    <!-- THE HIGH-VOLTAGE SPLASH LAYER -->
    <div id="splash-screen">
        <svg width="300" height="300" viewBox="0 0 100 100" xmlns="http://w3.org">
            <!-- Central Power Core Line -->
            <path class="neon-z" d="M25,25 L75,25 L25,75 L75,75" 
                  fill="none" stroke="#00d2ff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
            
            <!-- Electrical Fractures (Sparks jumping off the points) -->
            <path class="lightning-bolt bolt-1" d="M75,25 L85,15 L78,12 L90,2" />
            <path class="lightning-bolt bolt-2" d="M25,75 L15,85 L22,88 L8,98" />
            <path class="lightning-bolt bolt-3" d="M50,50 L45,40 L55,35 L48,22" />
        </svg>
    </div>

    <!-- MAIN INTERFACE DESKTOP CONTENTS -->
    <div class="main-content">
        <h1>ZEN CORE ACTIVE</h1>
        <p>Voltage parameters are stable at maximum discharge limits.</p>
    </div>

</body>
</html>
