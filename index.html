<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Maintenance</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        
        body { 
            background: #0a0b10; 
            color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
        }

        .maintenance-container { 
            background: #141621; 
            padding: 40px 30px; 
            border-radius: 20px; 
            border: 2px solid #1f2335; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); 
            width: 100%; 
            max-width: 450px; 
            text-align: center; 
        }

        .icon-gear {
            font-size: 65px;
            color: #f7768e;
            text-shadow: 0 0 20px rgba(247, 118, 142, 0.4);
            margin-bottom: 20px;
            display: inline-block;
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        h1 { 
            font-size: 26px; 
            font-weight: 700; 
            letter-spacing: 1px; 
            color: #ffffff;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        p { 
            color: #a9b1d6; 
            font-size: 16px; 
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .status-badge {
            display: inline-block;
            background: rgba(247, 118, 142, 0.1);
            color: #f7768e;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border: 1px solid rgba(247, 118, 142, 0.2);
            margin-bottom: 30px;
        }

        .footer-text {
            font-size: 12px;
            color: #565f89;
            letter-spacing: 0.5px;
            border-top: 1px solid #1f2335;
            padding-top: 20px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="maintenance-container">
    <div class="icon-gear">⚙️</div>
    <h1>Under Maintenance</h1>
    <div class="status-badge">Offline for Updates</div>
    <p>We are currently updating our database clusters and tuning pipeline configurations to improve system defenses. We will be back online shortly.</p>
    <div class="footer-text">ZEN CORE INFRASTRUCTURE • OVER-THE-AIR UPDATE</div>
</div>

</body>
</html>
